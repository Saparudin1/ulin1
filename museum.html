<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Museum Prabu Geusan Ulun</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f5f5;
}

/* HEADER */

.hero{
    background:#0D2B5C;
    color:white;
    text-align:center;
    padding:50px 20px;
}

.hero h1{
    font-size:2.5rem;
}

/* CONTAINER */

.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

/* FOTO UTAMA */

.foto{
    text-align:center;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

/* GAMBAR (AMAN UNTUK A4) */

.foto img{
    width:100%;
    max-width:700px;
    height:auto;
    border-radius:15px;
}

/* DESKRIPSI */

.deskripsi{
    margin-top:30px;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.deskripsi p{
    text-align:justify;
    margin-bottom:15px;
}

/* BACK BUTTON */

.back{
    text-align:center;
    margin-top:40px;
}

.back a{
    display:inline-block;
    background:#0D2B5C;
    color:white;
    padding:12px 30px;
    border-radius:50px;
    text-decoration:none;
    transition:.3s;
}

.back a:hover{
    background:#17448a;
}

/* RESPONSIVE */

@media(max-width:768px){

    .hero h1{
        font-size:2rem;
    }

    .foto img{
        max-width:100%;
    }

}

</style>
</head>

<body>

<!-- HEADER -->

<section class="hero">
    <h1>Museum</h1>
</section>

<!-- KONTEN -->

<div class="container">

    <!-- FOTO -->
    <div class="foto">

        <!-- GANTI GAMBAR DI SINI -->
        <img src="assets/museum.jpeg" alt="Kuda Renggong">

    </div>

    

    <!-- BACK -->
    <div class="back">
        <a href="wisata.html">← Kembali</a>
    </div>

</div>

</body>
</html>
